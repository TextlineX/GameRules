name: Compile Rulesets

on:
  push:
    paths:
      - 'src/**.json'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  compile:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Install sing-box
        run: |
          version=$(curl -s https://api.github.com/repos/SagerNet/sing-box/releases/latest | grep tag_name | cut -d '"' -f 4 | sed 's/v//')
          curl -Lo sing-box.tar.gz "https://github.com/SagerNet/sing-box/releases/download/v${version}/sing-box-${version}-linux-amd64.tar.gz"
          tar -xzf sing-box.tar.gz
          sudo mv sing-box-*/sing-box /usr/local/bin/
          rm -rf sing-box*

      - name: Compile JSON to SRS
        run: |
          mkdir -p dist
          for file in src/*.json; do
            filename=$(basename "$file" .json)
            echo "Compiling $file..."
            sing-box rule-set compile "$file" -o "dist/${filename}.srs"
          done

      - name: Commit and Push
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add dist/
          if git diff --staged --quiet; then
            echo "No changes to commit."
            exit 0
          fi
          git commit -m "chore: auto-compile rule-sets [skip ci]"
          git push
